name: Release

on:
  push:
    tags:
      # Stable and fork-interim stable: v0.0.21, v0.0.22-fork.1
      - "v*.*.*"
      # Exclude pure upstream nightly tags (should never land on this repo,
      # but belt-and-braces: the fork only publishes -fork.N suffixed nightlies)
      - "!v*-nightly.*"
      # Re-include fork nightly tags: v0.0.21-nightly.20260421.88-fork.1
      # (pushed by sync-upstream.yml after rebasing onto an upstream nightly)
      - "v*-nightly.*-fork.*"
  workflow_dispatch:
    inputs:
      channel:
        description: "Release channel"
        required: false
        default: stable
        type: choice
        options:
          - stable
      version:
        description: "Release version (for example 1.2.3, v1.2.3-fork.1, or v1.2.3-nightly.YYYYMMDD.RUN-fork.N)"
        required: false
        type: string
      target_ref:
        description: "Commit SHA, tag, or ref to build and publish. Defaults to the workflow ref."
        required: false
        type: string

permissions:
  contents: write
  id-token: write

# Serialize release runs. sync-upstream can push back-to-back tags if it
# catches up on several upstream nightlies in one run; concurrency ensures
# the later build waits instead of racing. cancel-in-progress: false so
# that an in-flight build always completes — a queued run will just wait.
concurrency:
  group: release-${{ github.workflow }}-${{ github.ref_name || github.run_id }}
  cancel-in-progress: false

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    outputs:
      release_channel: ${{ steps.release_meta.outputs.release_channel }}
      version: ${{ steps.release_meta.outputs.version }}
      tag: ${{ steps.release_meta.outputs.tag }}
      release_name: ${{ steps.release_meta.outputs.name }}
      short_sha: ${{ steps.release_meta.outputs.short_sha }}
      previous_tag: ${{ steps.previous_tag.outputs.previous_tag }}
      cli_dist_tag: ${{ steps.release_meta.outputs.cli_dist_tag }}
      is_prerelease: ${{ steps.release_meta.outputs.is_prerelease }}
      make_latest: ${{ steps.release_meta.outputs.make_latest }}
      ref: ${{ steps.release_meta.outputs.ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - id: release_meta
        name: Resolve release version
        shell: bash
        env:
          DISPATCH_CHANNEL: ${{ github.event.inputs.channel }}
          DISPATCH_VERSION: ${{ github.event.inputs.version }}
          DISPATCH_TARGET_REF: ${{ github.event.inputs.target_ref }}
          NIGHTLY_DATE: ${{ github.run_started_at }}
          NIGHTLY_SHA: ${{ github.sha }}
          NIGHTLY_RUN_NUMBER: ${{ github.run_number }}
        run: |
          set -euo pipefail

          resolve_target_ref() {
            local requested="${1:-$NIGHTLY_SHA}"
            local target_sha

            if ! target_sha="$(git rev-parse --verify "${requested}^{commit}" 2>/dev/null)"; then
              echo "Unable to resolve target ref to a commit: $requested" >&2
              exit 1
            fi

            echo "$target_sha"
          }

          emit_from_tag_version() {
            # Args: raw_version (without leading v)
            local version="$1"
            local target_sha="$2"
            local short_sha="${target_sha:0:12}"

            if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
              echo "Invalid release version: v$version" >&2
              exit 1
            fi

            echo "ref=$target_sha" >> "$GITHUB_OUTPUT"

            # Channel detection: presence of "-nightly." anywhere in the
            # pre-release identifies a nightly build (upstream-synced fork
            # nightly). Anything else (pure semver or "-fork.N") is stable.
            if [[ "$version" == *-nightly.* ]]; then
              echo "release_channel=nightly" >> "$GITHUB_OUTPUT"
              echo "version=$version" >> "$GITHUB_OUTPUT"
              echo "tag=v$version" >> "$GITHUB_OUTPUT"
              echo "name=T3 Code Nightly $version ($short_sha)" >> "$GITHUB_OUTPUT"
              echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
              echo "cli_dist_tag=nightly" >> "$GITHUB_OUTPUT"
              echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
              echo "make_latest=false" >> "$GITHUB_OUTPUT"
            else
              echo "release_channel=stable" >> "$GITHUB_OUTPUT"
              echo "version=$version" >> "$GITHUB_OUTPUT"
              echo "tag=v$version" >> "$GITHUB_OUTPUT"
              echo "name=T3 Code v$version" >> "$GITHUB_OUTPUT"
              echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
              echo "cli_dist_tag=latest" >> "$GITHUB_OUTPUT"
              if [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
                echo "make_latest=true" >> "$GITHUB_OUTPUT"
              else
                # -fork.N interim stable build. Publish as a normal latest
                # release so stable desktop clients can see it as an update.
                # Semver still lets the later upstream final release win:
                # X.Y.Z > X.Y.Z-fork.N.
                echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
                echo "make_latest=true" >> "$GITHUB_OUTPUT"
              fi
            fi
          }

          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            # Tag push (from sync-upstream.yml or manual `git push origin vX.Y.Z`).
            # Tag name is authoritative for both version and channel.
            raw="${GITHUB_REF_NAME}"
            target_sha="$(resolve_target_ref "$NIGHTLY_SHA")"
            emit_from_tag_version "${raw#v}" "$target_sha"
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            # Manual dispatch: version input required. Nightlies must be explicit
            # fork-nightly versions, e.g. vX.Y.Z-nightly.YYYYMMDD.RUN-fork.N.
            # Do not generate bare upstream-style nightly tags here.
            raw="${DISPATCH_VERSION}"
            if [[ -z "$raw" ]]; then
              echo "workflow_dispatch releases require the version input." >&2
              exit 1
            fi
            target_sha="$(resolve_target_ref "${DISPATCH_TARGET_REF:-$NIGHTLY_SHA}")"
            emit_from_tag_version "${raw#v}" "$target_sha"
          else
            echo "Unsupported event: ${GITHUB_EVENT_NAME}" >&2
            exit 1
          fi

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - id: previous_tag
        name: Resolve previous release tag
        run: |
          node scripts/resolve-previous-release-tag.ts \
            --channel "${{ steps.release_meta.outputs.release_channel }}" \
            --current-tag "${{ steps.release_meta.outputs.tag }}" \
            --github-output

  build:
    name: Build ${{ matrix.label }}
    needs: preflight
    if: ${{ !failure() && !cancelled() && needs.preflight.result == 'success' }}
    continue-on-error: ${{ matrix.platform == 'linux' && needs.preflight.outputs.release_channel == 'nightly' }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS arm64
            runner: [self-hosted, macOS, ARM64, t3code-mac-arm64]
            platform: mac
            target: dmg
            arch: arm64
          - label: Linux x64
            runner: ubuntu-24.04
            platform: linux
            target: AppImage
            arch: x64
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.preflight.outputs.ref }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - name: Install dependencies
        shell: bash
        run: |
          if [[ "${{ matrix.platform }}" == "linux" && "${{ needs.preflight.outputs.release_channel }}" == "nightly" ]]; then
            bun install --frozen-lockfile --ignore-scripts
          else
            bun install --frozen-lockfile
          fi

      - name: Align package versions to release version
        run: node scripts/update-release-package-versions.ts "${{ needs.preflight.outputs.version }}"

      - name: Install Spectre-mitigated MSVC libs
        if: matrix.platform == 'win'
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
             $installPath = & $vswhere -products * -latest -property installationPath
             $setupExe = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\setup.exe"
             $proc = Start-Process -FilePath $setupExe `
              -ArgumentList "modify", "--installPath", "`"$installPath`"", "--add", `
              "Microsoft.VisualStudio.Component.VC.Tools.x86.x64.Spectre", "--quiet", "--norestart" `
              -Wait -PassThru -NoNewWindow
             if ($null -eq $proc -or $proc.ExitCode -ne 0) {
               $code = if ($null -ne $proc) { $proc.ExitCode } else { 1 }
               Write-Error "Visual Studio Installer failed with exit code $code"
               exit $code
             }

      - name: Build desktop artifact
        shell: bash
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TRUSTED_SIGNING_ENDPOINT: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          AZURE_TRUSTED_SIGNING_ACCOUNT_NAME: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}
          AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME: ${{ secrets.AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME }}
          AZURE_TRUSTED_SIGNING_PUBLISHER_NAME: ${{ secrets.AZURE_TRUSTED_SIGNING_PUBLISHER_NAME }}
        run: |
          args=(
            --platform "${{ matrix.platform }}"
            --target "${{ matrix.target }}"
            --arch "${{ matrix.arch }}"
            --build-version "${{ needs.preflight.outputs.version }}"
            --verbose
          )

          has_all() {
            for value in "$@"; do
              if [[ -z "$value" ]]; then
                return 1
              fi
            done
            return 0
          }

          if [[ "${{ matrix.platform }}" == "mac" ]]; then
            if has_all "$CSC_LINK" "$CSC_KEY_PASSWORD" "$APPLE_API_KEY" "$APPLE_API_KEY_ID" "$APPLE_API_ISSUER"; then
              key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
              printf '%s' "$APPLE_API_KEY" > "$key_path"
              export APPLE_API_KEY="$key_path"
              echo "macOS signing enabled."
              args+=(--signed)
            else
              echo "macOS signing disabled (missing one or more Apple signing secrets)."
            fi
          else
            echo "Signing disabled for ${{ matrix.platform }}."
          fi

          # Retry on transient flakes (hdiutil "Device not configured" on macos-14,
          # network hiccups during native-deps download). Two tries is enough.
          attempt=1
          until bun run dist:desktop:artifact -- "${args[@]}"; do
            if [[ $attempt -ge 2 ]]; then
              echo "dist:desktop:artifact failed after $attempt attempts." >&2
              exit 1
            fi
            echo "dist:desktop:artifact attempt $attempt failed, retrying..." >&2
            attempt=$((attempt + 1))
            sleep 15
          done

      - name: Collect release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-publish

          shopt -s nullglob
          for pattern in \
            "release/*.dmg" \
            "release/*.zip" \
            "release/*.AppImage" \
            "release/*.exe" \
            "release/*.blockmap" \
            "release/*.yml"; do
            for file in $pattern; do
              cp "$file" release-publish/
            done
          done

          if [[ "${{ matrix.platform }}" == "mac" && "${{ matrix.arch }}" != "arm64" ]]; then
            shopt -s nullglob
            for manifest in release-publish/*-mac.yml; do
              mv "$manifest" "${manifest%.yml}-${{ matrix.arch }}.yml"
            done
          fi

          # Enable if Windows arm64 builds are enabled.
          # Windows updater metadata is channel-specific (for example
          # "latest.yml" or "nightly.yml"). Suffix each per-arch copy so the
          # release job can merge matching arm64/x64 manifests back into one
          # canonical manifest per channel.
          # if [[ "${{ matrix.platform }}" == "win" ]]; then
          #   shopt -s nullglob
          #   for manifest in release-publish/*.yml; do
          #     mv "$manifest" "${manifest%.yml}-win-${{ matrix.arch }}.yml"
          #   done
          # fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: desktop-${{ matrix.platform }}-${{ matrix.arch }}
          path: release-publish/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [preflight, build]
    if: ${{ !cancelled() && needs.preflight.result == 'success' && (needs.build.result == 'success' || needs.preflight.outputs.release_channel == 'nightly') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.preflight.outputs.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Download all desktop artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: desktop-*
          merge-multiple: true
          path: release-assets

      - name: Validate release assets
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          assets=(release-assets/*)
          if (( ${#assets[@]} == 0 )); then
            echo "No release assets were downloaded." >&2
            exit 1
          fi

          if [[ "${{ needs.preflight.outputs.release_channel }}" == "nightly" && ! -f release-assets/nightly-mac.yml ]]; then
            echo "Nightly macOS updater manifest release-assets/nightly-mac.yml is required." >&2
            exit 1
          fi

      - name: Merge macOS updater manifests
        run: |
          shopt -s nullglob
          for x64_manifest in release-assets/*-mac-x64.yml; do
            arm64_manifest="${x64_manifest%-x64.yml}.yml"
            if [[ -f "$arm64_manifest" ]]; then
              node scripts/merge-update-manifests.ts --platform mac "$arm64_manifest" "$x64_manifest"
              rm -f "$x64_manifest"
            fi
          done

      - name: Publish release
        if: needs.preflight.outputs.previous_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.preflight.outputs.tag }}
          target_commitish: ${{ needs.preflight.outputs.ref }}
          name: ${{ needs.preflight.outputs.release_name }}
          generate_release_notes: true
          previous_tag: ${{ needs.preflight.outputs.previous_tag }}
          prerelease: ${{ needs.preflight.outputs.is_prerelease }}
          make_latest: ${{ needs.preflight.outputs.make_latest }}
          files: |
            release-assets/*.dmg
            release-assets/*.zip
            release-assets/*.AppImage
            release-assets/*.blockmap
            release-assets/*.yml
          fail_on_unmatched_files: false
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Publish first release
        if: needs.preflight.outputs.previous_tag == ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.preflight.outputs.tag }}
          target_commitish: ${{ needs.preflight.outputs.ref }}
          name: ${{ needs.preflight.outputs.release_name }}
          generate_release_notes: true
          prerelease: ${{ needs.preflight.outputs.is_prerelease }}
          make_latest: ${{ needs.preflight.outputs.make_latest }}
          files: |
            release-assets/*.dmg
            release-assets/*.zip
            release-assets/*.AppImage
            release-assets/*.blockmap
            release-assets/*.yml
          fail_on_unmatched_files: false
          token: ${{ secrets.GH_PAT || github.token }}

  finalize:
    name: Finalize release
    if: ${{ !failure() && !cancelled() && needs.preflight.result == 'success' && needs.release.result == 'success' && needs.preflight.outputs.release_channel == 'stable' }}
    needs: [preflight, release]
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}
          persist-credentials: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - id: update_versions
        name: Update version strings
        env:
          RELEASE_VERSION: ${{ needs.preflight.outputs.version }}
        run: node scripts/update-release-package-versions.ts "$RELEASE_VERSION" --github-output

      - name: Format package.json files
        if: steps.update_versions.outputs.changed == 'true'
        run: bunx oxfmt apps/server/package.json apps/desktop/package.json apps/web/package.json packages/contracts/package.json

      - name: Refresh lockfile
        if: steps.update_versions.outputs.changed == 'true'
        run: bun install --lockfile-only --ignore-scripts

      - name: Commit and push version bump
        if: steps.update_versions.outputs.changed == 'true'
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.preflight.outputs.tag }}
        run: |
          if git diff --quiet -- apps/server/package.json apps/desktop/package.json apps/web/package.json packages/contracts/package.json bun.lock; then
            echo "No version changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add apps/server/package.json apps/desktop/package.json apps/web/package.json packages/contracts/package.json bun.lock
          git commit -m "chore(release): prepare $RELEASE_TAG"
          git push origin HEAD:main
