name: Sync Upstream

# Detects new releases on pingdotgg/t3code, rebases our fork commits onto the
# upstream tag, and pushes a release tag — which triggers release.yml to build.
#
# Scheduled runs check both channels independently. Manual runs can target one
# channel or leave the input blank to check both.
#
# Tag scheme pushed to the fork:
#   - stable channel: ${upstream_tag} verbatim (e.g. v0.0.21)
#   - nightly channel: ${upstream_tag}-fork.<N> (e.g.
#     v0.0.21-nightly.20260421.88-fork.1), where N auto-increments per
#     upstream nightly tag. The -fork suffix keeps fork artifacts
#     distinguishable. sync-upstream skips once any fork tag exists for the
#     same upstream nightly; reroll the same upstream commit by manually
#     dispatching release.yml with the next explicit -fork.N version.
#
# On rebase conflict: fails loudly with instructions to resolve locally.

on:
  schedule:
    - cron: "0 */3 * * *" # every 3 hours
  workflow_dispatch:
    inputs:
      channel:
        description: "Upstream channel. Leave blank to check both."
        required: false
        type: choice
        options:
          - ""
          - stable
          - nightly
        default: ""

concurrency:
  group: sync-upstream
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    name: Sync ${{ matrix.channel }} with upstream
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    strategy:
      fail-fast: false
      # Keep channels sequential inside the workflow because both may force-push main.
      max-parallel: 1
      matrix:
        channel:
          - stable
          - nightly

    steps:
      - name: Select channel
        id: channel
        run: |
          channel="${{ matrix.channel }}"
          requested="${{ inputs.channel }}"
          selected=true
          if [[ -n "$requested" && "$requested" != "$channel" ]]; then
            selected=false
          fi
          echo "channel=$channel" >> "$GITHUB_OUTPUT"
          echo "selected=$selected" >> "$GITHUB_OUTPUT"
          echo "Resolved channel: $channel (selected=$selected)"

      - name: Get latest upstream release tag
        if: steps.channel.outputs.selected == 'true'
        id: upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "${{ steps.channel.outputs.channel }}" == "nightly" ]]; then
            # First upstream release whose tag matches a nightly pattern.
            # Upstream has used two tag schemes: v<ver>-nightly.* and nightly-v<ver>-nightly.*
            tag=$(gh api repos/pingdotgg/t3code/releases --jq \
              '[.[] | select(.tag_name | test("(^|-)v[0-9]+\\.[0-9]+\\.[0-9]+-nightly\\."))][0].tag_name')
            if [[ -z "$tag" || "$tag" == "null" ]]; then
              echo "::error::No nightly release found on upstream."
              exit 1
            fi
            echo "Latest upstream nightly release: $tag"
          else
            tag=$(gh api repos/pingdotgg/t3code/releases/latest --jq .tag_name)
            echo "Latest upstream stable release: $tag"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Checkout fork
        if: steps.channel.outputs.selected == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # PAT required: GITHUB_TOKEN cannot push commits that modify workflow files
          token: ${{ secrets.GH_PAT }}

      - name: Configure git
        if: steps.channel.outputs.selected == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check if sync needed
        if: steps.channel.outputs.selected == 'true'
        id: check
        env:
          CHANNEL: ${{ steps.channel.outputs.channel }}
        run: |
          set -euo pipefail
          upstream_tag="${{ steps.upstream.outputs.tag }}"

          if [[ "$CHANNEL" == "nightly" ]]; then
            # Nightly: the fork publishes tags of the form
            # "${upstream_tag}-fork.<N>". If any such tag already exists, we've
            # already rolled this upstream nightly — skip. (A rebuild is still
            # possible by manually deleting the fork tags.)
            existing=$(git tag --list "${upstream_tag}-fork.*")
            if [[ -n "$existing" ]]; then
              echo "needed=false" >> "$GITHUB_OUTPUT"
              echo "Fork already has a build for $upstream_tag:"
              echo "$existing" | sed 's/^/  /'
              echo "Nothing to do."
            else
              fork_latest=$(git tag --list 'v*' --sort=-creatordate | head -n 1)
              echo "needed=true" >> "$GITHUB_OUTPUT"
              echo "fork_latest=$fork_latest" >> "$GITHUB_OUTPUT"
              echo "Upstream nightly at $upstream_tag, fork has no build yet (latest fork tag: $fork_latest). Syncing..."
            fi
          else
            # Stable: fork tag == upstream tag exactly.
            if git rev-parse --verify "$upstream_tag" >/dev/null 2>&1; then
              echo "needed=false" >> "$GITHUB_OUTPUT"
              echo "Fork already has $upstream_tag. Nothing to do."
            else
              fork_latest=$(git tag --list 'v*' | sort -V | tail -1)
              echo "needed=true" >> "$GITHUB_OUTPUT"
              echo "fork_latest=$fork_latest" >> "$GITHUB_OUTPUT"
              echo "Upstream at $upstream_tag, fork at $fork_latest. Syncing..."
            fi
          fi

      - name: Fetch upstream tag (namespaced to avoid clobbering fork tags)
        if: steps.check.outputs.needed == 'true'
        run: |
          upstream_tag="${{ steps.upstream.outputs.tag }}"
          git remote add upstream https://github.com/pingdotgg/t3code.git
          git fetch upstream main
          git fetch upstream "refs/tags/${upstream_tag}:refs/tags/upstream/${upstream_tag}"

      - name: Rebase fork commits onto upstream tag
        if: steps.check.outputs.needed == 'true'
        id: rebase
        env:
          # Files we always want to take upstream's version of during rebase.
          # release.yml's finalize job rewrites these on every release, which
          # creates perpetual conflicts with upstream's own version bumps.
          # Auto-resolving to upstream is safe because finalize will rewrite
          # them again after the next fork release builds.
          AUTO_RESOLVE_FILES: |
            apps/desktop/package.json
            apps/server/package.json
            apps/web/package.json
            packages/contracts/package.json
            bun.lock
        run: |
          set -euo pipefail
          upstream_tag="${{ steps.upstream.outputs.tag }}"
          upstream_ref="refs/tags/upstream/${upstream_tag}"

          echo "Rebasing onto $upstream_ref..."
          echo "Fork commits being replayed (relative to upstream/main):"
          git log --oneline upstream/main..HEAD

          # Build allowlist as a sorted unique set
          mapfile -t ALLOW < <(echo "$AUTO_RESOLVE_FILES" | sed '/^$/d' | sort -u)

          is_allowed() {
            local f="$1"
            for a in "${ALLOW[@]}"; do
              [[ "$f" == "$a" ]] && return 0
            done
            return 1
          }

          fail_with_conflicts() {
            local files="$1"
            git rebase --abort || true
            echo "status=conflict" >> "$GITHUB_OUTPUT"
            {
              echo "files<<EOF"
              echo "$files"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            exit 0
          }

          # Initial rebase attempt. If it fails, fall through to the
          # conflict-resolution loop below.
          if git rebase --onto "$upstream_ref" upstream/main; then
            echo "status=clean" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Loop: at each stop, either auto-resolve allowlisted file
          # conflicts (taking upstream's version) or bail out loudly.
          while [[ -d .git/rebase-merge || -d .git/rebase-apply ]]; do
            mapfile -t conflicted < <(git diff --name-only --diff-filter=U | sort -u)

            if [[ ${#conflicted[@]} -eq 0 ]]; then
              # No conflicts but rebase is stopped — likely an empty commit
              # after auto-resolve. Skip it and continue.
              git rebase --skip || break
              continue
            fi

            unknown=()
            for f in "${conflicted[@]}"; do
              is_allowed "$f" || unknown+=("$f")
            done

            if [[ ${#unknown[@]} -gt 0 ]]; then
              echo "Conflicts outside auto-resolve allowlist:"
              printf '  %s\n' "${unknown[@]}"
              fail_with_conflicts "$(printf '%s\n' "${conflicted[@]}")"
            fi

            echo "Auto-resolving (taking upstream) for: ${conflicted[*]}"
            for f in "${conflicted[@]}"; do
              # During rebase, "ours" = upstream (the new base),
              # "theirs" = the fork commit being replayed. We want upstream.
              git checkout --ours -- "$f"
              git add -- "$f"
            done

            # Continue. If the resulting commit is empty (it only touched
            # auto-resolved files), --continue will fail; --skip handles it.
            if ! GIT_EDITOR=true git rebase --continue; then
              if [[ -d .git/rebase-merge || -d .git/rebase-apply ]]; then
                git rebase --skip || break
              fi
            fi
          done

          echo "status=clean" >> "$GITHUB_OUTPUT"
          echo "Rebase completed (some version-bump conflicts auto-resolved to upstream)."

      - name: Push rebased main and release tag
        if: steps.check.outputs.needed == 'true' && steps.rebase.outputs.status == 'clean'
        env:
          CHANNEL: ${{ steps.channel.outputs.channel }}
        run: |
          set -euo pipefail
          upstream_tag="${{ steps.upstream.outputs.tag }}"

          if [[ "$CHANNEL" == "nightly" ]]; then
            # Fork nightly tag: ${upstream_tag}-fork.<N>. N is the next integer
            # after the largest existing -fork.<N> for this upstream tag.
            # Semver note: "88-fork" is a single pre-release identifier (hyphens
            # are valid inside identifiers); because it's alphanumeric (not pure
            # digits), it sorts strictly higher than the numeric "88" — so the
            # fork version is always > the upstream nightly it's based on.
            mapfile -t existing < <(git tag --list "${upstream_tag}-fork.*" \
              | awk -F '-fork\\.' 'NF==2 && $2 ~ /^[0-9]+$/ { print $2 }' \
              | sort -n)
            if [[ ${#existing[@]} -eq 0 ]]; then
              next_n=1
            else
              last="${existing[-1]}"
              next_n=$((last + 1))
            fi
            new_tag="${upstream_tag}-fork.${next_n}"
            git tag "$new_tag" HEAD
            git push origin HEAD:main --force-with-lease
            git push origin "$new_tag"
            echo "Pushed $new_tag (rebased onto $upstream_tag) — release.yml will build and publish."
          else
            new_tag="$upstream_tag"
            # Force-update tag in case git auto-followed it from the upstream fetch
            git tag -f "$new_tag"
            git push origin HEAD:main --force-with-lease
            git push origin "$new_tag" --force
            echo "Pushed $new_tag — release.yml will build and publish."
          fi

      - name: Fail with conflict resolution instructions
        if: steps.check.outputs.needed == 'true' && steps.rebase.outputs.status == 'conflict'
        env:
          CHANNEL: ${{ steps.channel.outputs.channel }}
        run: |
          upstream_tag="${{ steps.upstream.outputs.tag }}"
          echo "::error::Rebase conflict syncing to $upstream_tag (channel: $CHANNEL)."
          echo "::error::Conflicting files:"
          echo "${{ steps.rebase.outputs.files }}" | sed 's/^/::error::  /'
          echo "::error::"
          echo "::error::Resolve locally:"
          echo "::error::  git fetch upstream"
          echo "::error::  git fetch upstream 'refs/tags/${upstream_tag}:refs/tags/upstream/${upstream_tag}'"
          echo "::error::  git rebase refs/tags/upstream/${upstream_tag}"
          echo "::error::  # fix conflicts, then:"
          echo "::error::  git push origin main --force-with-lease"
          if [[ "$CHANNEL" == "nightly" ]]; then
            echo "::error::  # pick the next fork.N for this upstream tag:"
            echo "::error::  n=\$(( \$(git tag --list '${upstream_tag}-fork.*' | awk -F '-fork\\\\.' 'NF==2{print \$2}' | sort -n | tail -1) + 1 ))"
            echo "::error::  git tag \"${upstream_tag}-fork.\$n\" HEAD"
            echo "::error::  git push origin \"${upstream_tag}-fork.\$n\""
          else
            echo "::error::  git push origin ${upstream_tag}"
          fi
          exit 1
